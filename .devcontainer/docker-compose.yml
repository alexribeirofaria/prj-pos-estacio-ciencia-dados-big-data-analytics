services:
  rstudio:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: rstudio-dev-base
    image: alexfariakof/rstudio-dev-base:latest

    depends_on:
      - spark-master
      - spark-worker

    ports:
      - "8787:8787" # http://localhost:8787/ user: rstudio password: toor
      - "8888:8888" # http://localhost:8888/

    environment:
      PASSWORD: "toor"

      # Spark
      SPARK_MASTER: spark://spark-master:7077
      SPARK_HOME: /opt/spark
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    volumes:
      - ../workspace:/home/rstudio/workspace:cached
      - ../workspace:/workspace
      - vscode-extensions:/.vscode/extensions:/rstudio/.vscode-server/extensions

    restart: unless-stopped

    command:
      - /usr/local/bin/docker-entrypoint.sh

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"

  spark-master:
    image: bitnami/spark:3.5

    container_name: spark-master
    hostname: spark-master

    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"

    ports:
      - "7077:7077"
      - "8080:8080"

    volumes:
      - ../workspace:/workspace

  spark-worker:
    image: bitnami/spark:3.5

    container_name: spark-worker

    depends_on:
      - spark-master

    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077 #spark://localhost:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2

    ports:
      - "8081:8081"

    volumes:
      - ../workspace:/workspace

volumes:
  vscode-extensions: